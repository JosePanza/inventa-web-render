{% extends 'base.html' %}

{% block body %}
<div class="p-8 bg-gray-100 min-h-screen flex justify-center">

    <div class="bg-white rounded-2xl shadow-sm border p-6 w-full max-w-xl">

        <h2 class="text-2xl font-bold text-gray-800 mb-6">
            Editar Perfil
        </h2>

        <form method="POST">
            {% csrf_token %}

            <div class="space-y-4">

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Nombre
                    </label>
                    <input type="text" name="first_name"
                        value="{{ usuario.first_name }}"
                        class="w-full border rounded-xl px-4 py-2">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Apellido
                    </label>
                    <input type="text" name="last_name"
                        value="{{ usuario.last_name }}"
                        class="w-full border rounded-xl px-4 py-2">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Email
                    </label>
                    <input type="email" name="email"
                        value="{{ usuario.email }}"
                        class="w-full border rounded-xl px-4 py-2">
                </div>

                <div class="pt-4 border-t">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">Cambiar contraseña</h3>

                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">
                            Contraseña actual
                        </label>
                        <input type="password" name="password_actual"
                            class="w-full border rounded-xl px-4 py-2">
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">
                            Nueva contraseña
                        </label>
                        <input type="password" name="nueva_password"
                            class="w-full border rounded-xl px-4 py-2">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">
                            Confirmar nueva contraseña
                        </label>
                        <input type="password" name="confirmar_password"
                            class="w-full border rounded-xl px-4 py-2">
                    </div>
                </div>

            </div>

            <div class="flex justify-end gap-3 mt-6">
                <a href="{% url 'dashboard' %}"
                   class="px-4 py-2 border rounded-xl text-gray-700 hover:bg-gray-100">
                    Cancelar
                </a>

                <button type="submit"
                        class="px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-semibold">
                    Guardar cambios
                </button>
            </div>

        </form>

    </div>

</div>
{% endblock %}
